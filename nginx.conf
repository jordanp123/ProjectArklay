server {
    listen 8080;
    server_name scmeweb.rosesolutions.work;
    root /usr/share/nginx/html;
    index index.html;

    #Compression
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 64;

    # ── Hide Nginx version from error pages and headers ──────────────
    server_tokens off;

    # ── Security headers (see README.md "Security headers") ──────────
    # default-src 'none' locks everything down; scripts and styles are
    # same-origin only, with no 'unsafe-inline'. The one inline <script> in
    # index.html (the pre-paint theme setter) is allowlisted by its SHA-256
    # hash, so editing it stops the match and the browser blocks it. Keep the
    # hash in sync with tools/gen-csp.py. `always` = emit on 404/405 too.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'sha256-fFTSlS/s9lBfeYx6igOZCbJmqyWHFXDDh7Ws599Dmu0='; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; worker-src 'self'; manifest-src 'self'; object-src 'none'; child-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Caching: filenames are NOT content-hashed, so nothing may be cached
    # as immutable — a stale copy would also defeat an SRI/CSP hash update.
    # no-cache still allows conditional revalidation: unchanged files answer
    # with 304s. (gzip is transparent to SRI: the browser hashes the
    # decompressed bytes, so compression here is safe.)
    add_header Cache-Control "no-cache" always;

    # ── Only allow GET and HEAD — no POST, PUT, DELETE etc ───────────
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # ── Clean URLs ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # (No per-asset caching block: a location-level add_header would silently
    # DROP every inherited security header above, and the files aren't
    # content-hashed anyway — see the no-cache note.)

    # ── Block access to hidden files (.git, .env etc) ─────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block common exploit probes ───────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb)$ {
        deny all;
        return 404;
    }
}
